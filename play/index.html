  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --header-h: 48px;
      --bar-h: 40px;
      --sidebar-w: 260px;
      --bg-body: #0f1221;
      --bg-surface: #181c30;
      --bg-card: rgba(25, 30, 55, 0.7);
      --bg-card-hover: rgba(35, 42, 75, 0.85);
      --bg-gradient: linear-gradient(135deg, #7c5cfc 0%, #38bdf8 50%, #06d6a0 100%);
      --text-bright: #f0f0ff;
      --text-medium: #a0a4c0;
      --text-muted: #626580;
      --border-subtle: rgba(124, 92, 252, 0.15);
      --radius-sm: 8px;
      --radius-md: 12px;
    }

    html, body {
      height: 100%;
      background: var(--bg-body);
      color: var(--text-bright);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    /* ── Header ── */
    .gv-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: rgba(15, 18, 33, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }

    .gv-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .gv-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .gv-logo-icon {
      width: 32px; height: 32px;
      background: var(--bg-gradient);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gv-logo-text {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      background: var(--bg-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .gv-header-right { display: flex; align-items: center; gap: 8px; }
    .gv-nav { display: flex; gap: 8px; align-items: center; }

    .gv-nav a {
      color: var(--text-medium);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    .gv-nav a:hover {
      color: var(--text-bright);
      background: rgba(124, 92, 252, 0.1);
    }

    /* ── Main layout ── */
    .gv-main {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0; bottom: 0;
      display: flex;
      overflow: hidden;
    }

    /* ── Game area ── */
    .gv-game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .gv-iframe-wrap {
      flex: 1;
      position: relative;
      background: #000;
    }

    .gv-iframe-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* ── Game bar ── */
    .gv-game-bar {
      height: var(--bar-h);
      background: var(--bg-surface);
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .gv-game-name {
      font-weight: 700;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gv-category-tag {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      background: rgba(124, 92, 252, 0.12);
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .gv-bar-home {
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--text-medium);
      text-decoration: none;
      width: 34px; height: 34px;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }
    .gv-bar-home:hover { background: rgba(124,92,252,0.15); color: var(--text-bright); }

    .gv-bar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .gv-session-time {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .gv-fullscreen-btn {
      background: rgba(124, 92, 252, 0.2);
      border: 1px solid rgba(124, 92, 252, 0.35);
      color: var(--text-bright);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .gv-fullscreen-btn:hover {
      background: rgba(124, 92, 252, 0.25);
      color: var(--text-bright);
    }

    /* ── Sidebar ── */
    .gv-sidebar {
      width: var(--sidebar-w);
      background: var(--bg-surface);
      border-left: 1px solid var(--border-subtle);
      overflow-y: auto;
      flex-shrink: 0;
      padding: 16px 12px;
    }

    .gv-sidebar::-webkit-scrollbar { width: 4px; }
    .gv-sidebar::-webkit-scrollbar-track { background: transparent; }
    .gv-sidebar::-webkit-scrollbar-thumb { background: rgba(124,92,252,0.2); border-radius: 2px; }

    .gv-sidebar-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .gv-sidebar-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .gv-sidebar-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: var(--text-bright);
      transition: background 0.2s;
      cursor: pointer;
    }
    .gv-sidebar-card:hover {
      background: var(--bg-card-hover);
    }
    .gv-sidebar-card.active {
      background: rgba(124, 92, 252, 0.15);
      border: 1px solid rgba(124, 92, 252, 0.25);
    }

    .gv-sidebar-thumb {
      width: 64px; height: 40px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .gv-sidebar-info { min-width: 0; }

    .gv-sidebar-name {
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gv-sidebar-cat {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* ── Sidebar Leaderboard ── */
    .gv-sidebar-section {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .gv-lb-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
      border-radius: 6px;
      font-size: 0.82rem;
    }
    .gv-lb-row.you {
      background: rgba(124, 92, 252, 0.1);
      border: 1px solid rgba(124, 92, 252, 0.2);
    }

    .gv-lb-rank {
      width: 20px;
      font-weight: 800;
      font-size: 0.8rem;
      text-align: center;
      color: var(--text-muted);
    }
    .gv-lb-rank.gold { color: #ffc107; }
    .gv-lb-rank.silver { color: #b0b8c8; }
    .gv-lb-rank.bronze { color: #cd7f32; }

    .gv-lb-name {
      flex: 1;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gv-lb-score {
      font-weight: 700;
      color: #06d6a0;
      font-variant-numeric: tabular-nums;
      font-size: 0.8rem;
    }

    .gv-lb-divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.7rem;
      padding: 2px 0;
      letter-spacing: 2px;
    }

    .gv-lb-empty {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
      padding: 12px 0;
    }

    .gv-lb-link {
      display: block;
      text-align: center;
      margin-top: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #a78bfa;
      text-decoration: none;
      padding: 6px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .gv-lb-link:hover { background: rgba(124, 92, 252, 0.1); }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      :root {
        --header-h: 44px;
        --bar-h: 36px;
      }

      .gv-nav a.gv-nav-desktop { display: none; }

      .gv-logo-text { font-size: 1.1rem; }

      .gv-main {
        flex-direction: column;
        overflow-y: auto;
      }

      .gv-game-area {
        flex: none;
        height: calc(100vh - var(--header-h));
        height: calc(100dvh - var(--header-h));
      }

      .gv-sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border-subtle);
        padding: 16px;
      }

      .gv-sidebar-grid {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 8px;
      }

      .gv-sidebar-card {
        flex-direction: column;
        width: calc(50% - 4px);
        padding: 0;
        overflow: hidden;
        border-radius: var(--radius-md);
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
      }
      .gv-sidebar-card:hover {
        border-color: rgba(124, 92, 252, 0.3);
      }

      .gv-sidebar-thumb {
        width: 100%; height: auto;
        aspect-ratio: 16/9;
        border-radius: 0;
      }

      .gv-sidebar-info {
        padding: 8px 10px;
        width: 100%;
      }

      .gv-fullscreen-btn {
        padding: 5px 10px;
        font-size: 0.75rem;
      }
    }

    /* ── Mobile landscape: bar becomes thin side strip ── */
    @media (max-height: 500px) {
      .gv-header { display: none; }
      .gv-main { top: 0; }
      .gv-sidebar { display: none; }

      .gv-game-area {
        flex: 1;
        flex-direction: row;
        height: 100vh; height: 100dvh;
      }

      .gv-game-bar {
        order: -1;
        width: 42px;
        height: 100%;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-top: none;
        border-right: 1px solid var(--border-subtle);
      }

      .gv-bar-home { display: flex; }
      .gv-game-name { display: none; }
      .gv-session-time { display: none; }

      .gv-bar-right {
        flex-direction: column;
        gap: 12px;
      }

      .gv-fullscreen-btn {
        padding: 6px;
        border-radius: 8px;
        width: 34px; height: 34px;
        justify-content: center;
      }
      .gv-fullscreen-btn span { display: none; }
    }

    /* ── Mobile portrait: compact bottom bar ── */
    @media (max-width: 768px) and (orientation: portrait) {
      .gv-game-bar { height: 32px; padding: 0 10px; }
      .gv-bar-home { display: flex; width: 28px; height: 28px; }
      .gv-game-name { font-size: 0.8rem; }
      .gv-category-tag { display: none; }
      .gv-session-time { display: none; }
      .gv-fullscreen-btn span { display: none; }
      .gv-fullscreen-btn { padding: 5px; width: 28px; height: 28px; justify-content: center; }
    }

    /* ── Portrait orientation overlay ── */
    .gv-rotate-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #050010;
      z-index: 9999;
      color: #00eaff;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      font-family: 'Nunito', sans-serif;
    }
    .gv-rotate-icon {
      font-size: 60px;
      animation: gvRotateAnim 2s infinite ease-in-out;
    }
    .gv-rotate-text {
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.6;
    }
    @keyframes gvRotateAnim {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(-90deg); }
      100% { transform: rotate(0deg); }
    }
    @media screen and (max-width: 768px) and (orientation: portrait) {
      .gv-rotate-overlay.active { display: flex; }
    }

    /* ── Fullscreen state ── */
    .gv-game-area:fullscreen,
    .gv-game-area:-webkit-full-screen {
      background: #000;
    }
    .gv-game-area:fullscreen .gv-iframe-wrap,
    .gv-game-area:-webkit-full-screen .gv-iframe-wrap {
      flex: 1;
    }
    .gv-game-area:fullscreen .gv-game-bar,
    .gv-game-area:-webkit-full-screen .gv-game-bar {
      background: rgba(15, 18, 33, 0.95);
    }

    /* ── Error state ── */
    .gv-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: var(--text-medium);
    }
    .gv-error h2 { font-size: 1.3rem; color: var(--text-bright); }
    .gv-error a {
      color: #7c5cfc;
      text-decoration: none;
      font-weight: 700;
      padding: 10px 24px;
      background: rgba(124, 92, 252, 0.15);
      border-radius: 8px;
      transition: background 0.2s;
    }
    .gv-error a:hover { background: rgba(124, 92, 252, 0.25); }
  </style>
</head>
<body>

  <!-- Rotate overlay (mobile portrait) -->
  <div class="gv-rotate-overlay" id="rotateOverlay">
    <div class="gv-rotate-icon">📱</div>
    <div class="gv-rotate-text">ROTATE YOUR DEVICE<br>FOR THE BEST EXPERIENCE</div>
  </div>

  <!-- Header -->
  <header class="gv-header">
    <div class="gv-header-left">
      <a href="/" class="gv-logo">
        <div class="gv-logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><polygon points="13,2 5,14 11,14 9,22 19,10 13,10 15,2" fill="white"/></svg>
        </div>
        <span class="gv-logo-text">GameVolt</span>
      </a>
    </div>
    <div class="gv-header-right">
      <nav class="gv-nav">
        <a href="/" class="gv-nav-desktop">Games</a>
        <a href="/about/" class="gv-nav-desktop">About</a>
        <a href="/profile/" class="gv-nav-desktop" id="gv-profile-link" style="display:none">Profile</a>
      </nav>
      <div id="gv-user-area" style="display:flex;align-items:center;gap:6px;margin-left:8px">
        <button id="gv-login-btn" style="padding:6px 14px;background:linear-gradient(135deg,#6C5CE7,#00B4D8);color:#fff;border:none;border-radius:6px;font-weight:700;font-size:0.8rem;cursor:pointer;letter-spacing:1px" onclick="if(window.GameVolt)GameVolt.auth.login()">LOG IN</button>
        <a href="/profile/" id="gv-username" style="display:none;color:#00e5ff;font-weight:600;font-size:0.85rem;text-decoration:none"></a>
      </div>
    </div>
  </header>

  <!-- Main -->
  <div class="gv-main">
    <!-- Game area -->
    <div class="gv-game-area" id="gameArea">
      <div class="gv-iframe-wrap" id="iframeWrap">
        <iframe id="gameFrame" allowfullscreen allow="autoplay; fullscreen; gamepad"></iframe>
      </div>
      <div class="gv-game-bar">
        <a href="/" class="gv-bar-home" title="Back to GameVolt">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <div class="gv-game-name">
          <span id="gameName">Loading...</span>
          <span class="gv-category-tag" id="gameCategory"></span>
        </div>
        <div class="gv-bar-right">
          <span class="gv-session-time" id="sessionTime"></span>
          <button class="gv-fullscreen-btn" id="fullscreenBtn" title="Fullscreen">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
            <span>Fullscreen</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="gv-sidebar" id="sidebar">
      <div class="gv-sidebar-section" id="sidebarLbSection" style="display:none">
        <div class="gv-sidebar-title">Leaderboard</div>
        <div id="sidebarLbList"></div>
        <a href="/leaderboards/" class="gv-lb-link" id="sidebarLbLink">Full Leaderboard →</a>
      </div>
      <div class="gv-sidebar-title">More Games</div>
      <div class="gv-sidebar-grid" id="sidebarGrid"></div>
    </aside>
  </div>

  <script>
    const GAMES = {
      snake:     { name: "Snake Neo",   category: "Arcade", path: "/snake/",      thumb: "/assets/thumbnails/snake.webp" },
      breakout:  { name: "Breakout",    category: "Arcade", path: "/breakout/",   thumb: "/assets/thumbnails/breakout.webp", landscape: true },
      taprush:   { name: "Tap Rush",    category: "Arcade", path: "/taprush/",    thumb: "/assets/thumbnails/taprush.webp" },
      solitaire: { name: "Solitaire",   category: "Board",  path: "/solitaire/",  thumb: "/assets/thumbnails/solitaire.webp" },
      connect4:  { name: "Connect 4",   category: "Board",  path: "/connect4/",   thumb: "/assets/thumbnails/connect4-thumbnail.webp" },
      blockstorm:{ name: "BlockStorm",  category: "Puzzle", path: "/blockstorm/", thumb: "/assets/thumbnails/blockstorm.webp" },
      hoverdash: { name: "HoverDash",   category: "Action", path: "/hoverdash/",  thumb: "/hoverdash/og-image.png" },
      axeluga:   { name: "Axeluga",     category: "Action", path: "/axeluga/",    thumb: "/assets/thumbnails/axeluga.webp" },
      gravitywell:{ name: "Gravity Well", category: "Arcade", path: "/gravitywell/", thumb: "/assets/thumbnails/gravitywell.webp" },
      sudoku:    { name: "Sudoku",       category: "Puzzle", path: "/sudoku/",      thumb: "/assets/thumbnails/sudoku.webp" }
    };

    const frame = document.getElementById('gameFrame');
    const nameEl = document.getElementById('gameName');
    const catEl = document.getElementById('gameCategory');
    const grid = document.getElementById('sidebarGrid');
    const fsBtn = document.getElementById('fullscreenBtn');
    const gameArea = document.getElementById('gameArea');
    const sessionTimeEl = document.getElementById('sessionTime');
    const rotateOverlay = document.getElementById('rotateOverlay');

    let currentGame = null;
    let sessionStart = null;
    let sessionTimerInterval = null;

    function getGameParam() {
      const params = new URLSearchParams(window.location.search);
      return params.get('game');
    }

    // Session timer display
    function startSessionTimer() {
      clearInterval(sessionTimerInterval);
      sessionTimerInterval = setInterval(function() {
        if (!sessionStart) return;
        var elapsed = Date.now() - sessionStart;
        var mins = Math.floor(elapsed / 60000);
        var secs = Math.floor((elapsed % 60000) / 1000);
        sessionTimeEl.textContent = mins + ':' + String(secs).padStart(2, '0');
      }, 1000);
    }

    function loadGame(key) {
      const game = GAMES[key];
      if (!game) {
        document.querySelector('.gv-game-area').innerHTML =
          '<div class="gv-error"><h2>Game not found</h2><p>This game doesn\'t exist.</p><a href="/">Browse Games</a></div>';
        return;
      }

      // End previous session
      if (currentGame && sessionStart && window.GVTracker) {
        GVTracker.endSession(currentGame, sessionStart);
      }

      currentGame = key;
      frame.src = game.path;
      nameEl.textContent = game.name;
      catEl.textContent = game.category;
      document.title = game.name + ' – Play Free on GameVolt';

      // Show rotate overlay only for landscape-required games
      rotateOverlay.classList.toggle('active', !!game.landscape);

      // Start session tracking
      if (window.GVTracker) {
        sessionStart = GVTracker.startSession(key);
        sessionTimeEl.textContent = '0:00';
        startSessionTimer();
      }

      // Give iframe focus after load
      frame.onload = function() { frame.focus(); };

      renderSidebar(key);

      const url = '/play/?game=' + key;
      if (window.location.search !== '?game=' + key) {
        history.pushState({ game: key }, '', url);
      }
    }

    function renderSidebar(activeKey) {
      grid.innerHTML = '';
      for (const [key, game] of Object.entries(GAMES)) {
        if (key === activeKey) continue;
        const card = document.createElement('a');
        card.className = 'gv-sidebar-card';
        card.href = '/play/?game=' + key;
        card.onclick = (e) => {
          e.preventDefault();
          loadGame(key);
        };
        card.innerHTML =
          '<img class="gv-sidebar-thumb" src="' + game.thumb + '" alt="' + game.name + '" loading="lazy">' +
          '<div class="gv-sidebar-info">' +
            '<div class="gv-sidebar-name">' + game.name + '</div>' +
            '<div class="gv-sidebar-cat">' + game.category + '</div>' +
          '</div>';
        grid.appendChild(card);
      }
    }

    // Fullscreen toggle
    fsBtn.addEventListener('click', () => {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      } else if (gameArea.requestFullscreen) {
        gameArea.requestFullscreen();
      } else if (gameArea.webkitRequestFullscreen) {
        gameArea.webkitRequestFullscreen();
      }
    });

    // Update button text on fullscreen change
    document.addEventListener('fullscreenchange', updateFsBtn);
    document.addEventListener('webkitfullscreenchange', updateFsBtn);
    function updateFsBtn() {
      var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      fsBtn.querySelector('span').textContent = isFs ? 'Exit' : 'Fullscreen';
      fsBtn.title = isFs ? 'Exit Fullscreen' : 'Fullscreen';
    }

    // End session on page unload
    window.addEventListener('beforeunload', function() {
      if (currentGame && sessionStart && window.GVTracker) {
        GVTracker.endSession(currentGame, sessionStart);
      }
    });

    // Pause/resume tracking on visibility change (mobile tab switch)
    document.addEventListener('visibilitychange', function() {
      if (!window.GVTracker || !currentGame) return;
      if (document.hidden) {
        if (sessionStart) {
          GVTracker.endSession(currentGame, sessionStart);
          sessionStart = null;
          clearInterval(sessionTimerInterval);
        }
      } else {
        sessionStart = Date.now();
        startSessionTimer();
      }
    });

    // PostMessage listener for game events
    window.addEventListener('message', function(event) {
      if (!event.data || event.data.type !== 'gamevolt') return;
      if (!currentGame || !window.GVTracker) return;

      var gameId = event.data.gameId || currentGame;
      if (gameId !== currentGame) return;

      var action = event.data.action;
      var payload = event.data.payload || {};

      switch (action) {
        case 'game_start':
          GVTracker.recordEvent(gameId, 'game_start');
          break;
        case 'game_over':
          GVTracker.recordEvent(gameId, 'game_over');
          if (payload.score) GVTracker.recordHighScore(gameId, payload.score, payload.mode);
          break;
        case 'high_score':
          if (payload.score) GVTracker.recordHighScore(gameId, payload.score, payload.mode);
          break;
        case 'level_complete':
          GVTracker.recordEvent(gameId, 'level_complete');
          break;
        case 'achievement':
          GVTracker.recordEvent(gameId, 'achievement');
          break;
      }
    });

    // Prevent parent scroll when touching iframe area (mobile)
    var iframeWrap = document.getElementById('iframeWrap');
    iframeWrap.addEventListener('touchmove', function(e) {
      e.preventDefault();
    }, { passive: false });

    // Back/forward navigation
    window.addEventListener('popstate', (e) => {
      const key = e.state?.game || getGameParam();
      if (key && GAMES[key]) loadGame(key);
    });

    // Init
    const gameKey = getGameParam();
    if (gameKey) {
      loadGame(gameKey);
    } else {
      window.location.href = '/';
    }

    // GameVolt SDK: init + auth state
    var gvCurrentUserId = null;
    if (window.GameVolt) {
      GameVolt.init('player');
      GameVolt.auth.onStateChange(function(user) {
        var loginBtn = document.getElementById('gv-login-btn');
        var usernameEl = document.getElementById('gv-username');
        var profileLink = document.getElementById('gv-profile-link');
        if (user) {
          loginBtn.style.display = 'none';
          usernameEl.style.display = '';
          usernameEl.textContent = user.username || user.email || 'Player';
          if (profileLink) profileLink.style.display = '';
          gvCurrentUserId = user.id;
        } else {
          loginBtn.style.display = '';
          usernameEl.style.display = 'none';
          if (profileLink) profileLink.style.display = 'none';
          gvCurrentUserId = null;
        }
      });
    }

    // ── Sidebar Leaderboard ──
    var SB_URL = 'https://nwkjayseuhvvpkdgpivm.supabase.co';
    var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53a2pheXNldWh2dnBrZGdwaXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzQxMzYsImV4cCI6MjA4Nzk1MDEzNn0.lGCRdYlgxWJlzM6_XpML3f8AKUJG3tLmzNRLTPR0TnU';

    var lastLbGame = null;

    function loadSidebarLeaderboard(gameId) {
      if (!gameId || gameId === lastLbGame) return;
      lastLbGame = gameId;

      var section = document.getElementById('sidebarLbSection');
      var list = document.getElementById('sidebarLbList');

      fetch(SB_URL + '/rest/v1/rpc/get_leaderboard', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY
        },
        body: JSON.stringify({ p_game_id: gameId, p_mode: 'default', p_limit: 5 })
      })
      .then(function(r) { return r.ok ? r.json() : []; })
      .then(function(rows) {
        if (!rows || !rows.length) {
          section.style.display = 'none';
          return;
        }

        section.style.display = '';
        var userInTop = false;
        var html = rows.map(function(r) {
          var isYou = gvCurrentUserId && r.user_id === gvCurrentUserId;
          if (isYou) userInTop = true;
          var rankClass = r.rank === 1 ? 'gold' : r.rank === 2 ? 'silver' : r.rank === 3 ? 'bronze' : '';
          var name = r.username || 'Player';
          return '<div class="gv-lb-row' + (isYou ? ' you' : '') + '">' +
            '<span class="gv-lb-rank ' + rankClass + '">#' + r.rank + '</span>' +
            '<span class="gv-lb-name">' + escHtml(name) + (isYou ? ' (you)' : '') + '</span>' +
            '<span class="gv-lb-score">' + Number(r.score).toLocaleString() + '</span>' +
          '</div>';
        }).join('');

        // If logged in user not in top 5, fetch their rank
        if (gvCurrentUserId && !userInTop) {
          fetch(SB_URL + '/rest/v1/rpc/get_leaderboard', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SB_KEY,
              'Authorization': 'Bearer ' + SB_KEY
            },
            body: JSON.stringify({ p_game_id: gameId, p_mode: 'default', p_limit: 100 })
          })
          .then(function(r) { return r.ok ? r.json() : []; })
          .then(function(all) {
            var me = all.find(function(r) { return r.user_id === gvCurrentUserId; });
            if (me) {
              html += '<div class="gv-lb-divider">···</div>';
              html += '<div class="gv-lb-row you">' +
                '<span class="gv-lb-rank">#' + me.rank + '</span>' +
                '<span class="gv-lb-name">' + escHtml(me.username || 'Player') + ' (you)</span>' +
                '<span class="gv-lb-score">' + Number(me.score).toLocaleString() + '</span>' +
              '</div>';
            }
            list.innerHTML = html;
          });
        } else {
          list.innerHTML = html;
        }
      });
    }

    function escHtml(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    // Hook into loadGame to refresh leaderboard
    var _origLoadGame = loadGame;
    loadGame = function(key) {
      _origLoadGame(key);
      loadSidebarLeaderboard(key);
    };

    // Load for initial game
    if (currentGame) loadSidebarLeaderboard(currentGame);
  </script>
</body>
</html>
