<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#ff00ff"/>
      <stop offset="100%" style="stop-color:#ff006a"/>
    </linearGradient>
    <linearGradient id="gGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#00c0dd"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="100%" style="stop-color:#ff006a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" fill="#0a0a1a" rx="16"/>

  <!-- Lightning bolt -->
  <g filter="url(#glow)" transform="translate(32, 8)">
    <polygon
      points="35,0 13,37 27,37 18,76 54,30 37,30 48,0"
      fill="url(#boltGrad)"
      stroke="#00f0ff"
      stroke-width="1"
      stroke-linejoin="round"
    />
    <polygon
      points="35,8 18,34 28,34 22,66 48,33 36,33 43,8"
      fill="white"
      opacity="0.15"
    />
  </g>

  <!-- GV text -->
  <text x="24" y="110" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="36" filter="url(#glow)">
    <tspan fill="url(#gGrad)">G</tspan><tspan fill="url(#vGrad)">V</tspan>
  </text>
</svg>
