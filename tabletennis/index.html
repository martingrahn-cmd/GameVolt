<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0d0b1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <title>Table Tennis (prototype) — GameVolt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0d0b1a; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #eaf6ff; -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #cv { position: fixed; inset: 0; width: 100%; height: 100%; touch-action: none; }

    .overlay {
      position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: radial-gradient(ellipse at 50% 30%, rgba(20,16,40,0.88), rgba(8,6,18,0.96));
    }
    .overlay.hidden { display: none; }
    .title {
      font-size: clamp(2rem, 8vw, 3.4rem); font-weight: 900; letter-spacing: 6px;
      background: linear-gradient(180deg, #7fd8ff, #00eaff 55%, #0790b8);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-shadow: 0 0 34px rgba(0,234,255,0.35); text-align: center;
    }
    .subtitle { font-size: 0.72rem; letter-spacing: 3px; color: #8fa8c8; text-transform: uppercase; }
    .proto-tag {
      font-size: 0.6rem; letter-spacing: 2px; color: #ffd166; border: 1px solid rgba(255,209,102,0.4);
      border-radius: 999px; padding: 3px 12px; text-transform: uppercase;
    }
    .btn {
      font-family: inherit; font-weight: 800; letter-spacing: 3px; font-size: 0.95rem;
      color: #bff4ff; background: rgba(0,234,255,0.07); border: 1px solid rgba(0,234,255,0.45);
      border-radius: 12px; padding: 14px 44px; cursor: pointer; min-width: 240px;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .btn:hover { background: rgba(0,234,255,0.16); box-shadow: 0 0 22px rgba(0,234,255,0.35); }
    .btn.easy { border-color: rgba(70,230,150,0.5); color: #a9f5cd; background: rgba(70,230,150,0.06); }
    .btn.easy:hover { background: rgba(70,230,150,0.15); box-shadow: 0 0 22px rgba(70,230,150,0.35); }
    .btn.medium { border-color: rgba(255,214,60,0.5); color: #ffe58a; background: rgba(255,214,60,0.06); }
    .btn.medium:hover { background: rgba(255,214,60,0.14); box-shadow: 0 0 22px rgba(255,214,60,0.35); }
    .btn.hard { border-color: rgba(255,80,120,0.5); color: #ff9ab5; background: rgba(255,80,120,0.06); }
    .btn.hard:hover { background: rgba(255,80,120,0.14); box-shadow: 0 0 22px rgba(255,80,120,0.35); }
    .btn.ghost { border-color: rgba(255,255,255,0.22); color: #9fb4cc; background: transparent; }
    .menu-note { font-size: 0.68rem; color: #6d84a3; letter-spacing: 1px; margin-top: 6px; }
    #install-btn {
      font-family: inherit; font-weight: 800; letter-spacing: 2px; font-size: 0.72rem;
      color: #bff4ff; background: transparent; border: 1px dashed rgba(0,234,255,0.4);
      border-radius: 999px; padding: 8px 20px; cursor: pointer; margin-top: 8px;
    }
    #install-btn.hidden, #ios-hint.hidden, #update-chip.hidden { display: none; }
    #ios-hint { font-size: 0.64rem; color: #8fa8c8; letter-spacing: 1px; margin-top: 8px; text-align: center; }
    #update-chip {
      font-family: inherit; font-weight: 800; letter-spacing: 2px; font-size: 0.78rem;
      color: #0d0b1a; background: #ffd166; border: 0; border-radius: 10px;
      padding: 10px 20px; cursor: pointer; margin-top: 10px;
      box-shadow: 0 0 22px rgba(255,209,102,0.5); animation: chipPulse 1.5s infinite;
    }
    @keyframes chipPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    #hud {
      position: fixed; top: max(10px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
      z-index: 5; display: flex; align-items: center; gap: 14px;
      background: rgba(10,8,24,0.55); border: 1px solid rgba(0,234,255,0.25);
      border-radius: 12px; padding: 7px 18px; backdrop-filter: blur(4px);
      font-weight: 800; letter-spacing: 2px; font-size: 1.0rem; white-space: nowrap;
    }
    #hud.hidden { display: none; }
    #hud .who { font-size: 0.62rem; color: #7f98b8; letter-spacing: 2px; }
    #hud .sc { color: #fff; min-width: 1.2em; text-align: center; }
    #hud .serve-dot { color: #ffd166; font-size: 0.7rem; width: 0.8em; text-align: center; }
    #hud .lvl { font-size: 0.6rem; color: #ffd166; letter-spacing: 2px; }

    #banner {
      position: fixed; top: 34%; left: 50%; transform: translate(-50%, -50%); z-index: 6;
      font-size: clamp(1.6rem, 6vw, 2.6rem); font-weight: 900; letter-spacing: 6px;
      color: #fff; text-shadow: 0 0 26px rgba(0,234,255,0.7); pointer-events: none;
      opacity: 0; transition: opacity 0.12s;
    }
    #banner.on { opacity: 1; }

    #hint {
      position: fixed; bottom: max(16px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
      z-index: 5; font-size: 0.7rem; letter-spacing: 3px; color: #8fd8ff; text-transform: uppercase;
      text-shadow: 0 0 12px rgba(0,234,255,0.5); pointer-events: none;
      opacity: 0; transition: opacity 0.2s; white-space: nowrap;
    }
    #hint.on { opacity: 1; animation: hintPulse 1.4s ease-in-out infinite; }
    @keyframes hintPulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }

    .modal-title { font-size: clamp(1.6rem, 7vw, 2.6rem); font-weight: 900; letter-spacing: 4px; }
    .modal-title.win { color: #7dffb0; text-shadow: 0 0 30px rgba(70,230,150,0.6); }
    .modal-title.lose { color: #ff8aa8; text-shadow: 0 0 30px rgba(255,80,120,0.55); }
    .modal-sub { font-size: 0.85rem; color: #9fb4cc; letter-spacing: 1px; }

    #version {
      position: fixed; bottom: 6px; right: 10px; z-index: 4; font-size: 0.58rem;
      color: rgba(143,168,200,0.5); letter-spacing: 1px; pointer-events: none;
    }
    #snd-btn {
      position: fixed; top: max(10px, env(safe-area-inset-top)); right: 12px; z-index: 7;
      width: 40px; height: 38px; font-size: 1.05rem; cursor: pointer;
      color: #bff4ff; background: rgba(10,8,24,0.55); border: 1px solid rgba(0,234,255,0.25);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <canvas id="cv"></canvas>

  <div id="hud" class="hidden">
    <span class="who">YOU</span>
    <span class="serve-dot" id="dot1"></span>
    <span class="sc" id="sc1">0</span>
    <span style="color:#54708f">·</span>
    <span class="sc" id="sc2">0</span>
    <span class="serve-dot" id="dot2"></span>
    <span class="who">AI</span>
    <span class="lvl" id="lvl"></span>
  </div>
  <div id="banner"></div>
  <div id="hint"></div>
  <div id="version"></div>
  <button id="snd-btn"></button>

  <div class="overlay" id="menu">
    <div class="title">TABLE TENNIS</div>
    <div class="subtitle">2.5D arcade ping pong</div>
    <div class="proto-tag">Prototype · Phase 0</div>
    <div style="height:8px"></div>
    <button class="btn easy" data-level="easy">EASY</button>
    <button class="btn medium" data-level="medium">MEDIUM</button>
    <button class="btn hard" data-level="hard">HARD</button>
    <div class="menu-note">Drag to move your paddle — swipe through the ball to aim.<br>First to 11, win by 2. Tap to toss, then swipe through the ball to strike the serve.</div>
    <button id="update-chip" class="hidden">◆ NEW VERSION — TAP TO UPDATE</button>
    <button id="install-btn" class="hidden">⬇ INSTALL APP</button>
    <div id="ios-hint" class="hidden">On iPhone: Share <span style="font-size:0.8rem">⎋</span> → “Add to Home Screen”</div>
  </div>

  <div class="overlay hidden" id="end">
    <div class="modal-title" id="end-title"></div>
    <div class="modal-sub" id="end-sub"></div>
    <div style="height:8px"></div>
    <button class="btn" id="again-btn">PLAY AGAIN</button>
    <button class="btn ghost" id="menu-btn">MENU</button>
  </div>

  <!-- ?v= must be bumped on every release: Cloudflare edge-caches the .js
       files separately from index.html, and a stale physics file with a
       fresh shell is exactly the bug you can't reproduce locally -->
  <script src="tt-core.js?v=0.16.0"></script>
  <script src="tt-ai.js?v=0.16.0"></script>
  <script>
    'use strict';
    var VERSION = '0.16.0';
    var K = TTCore.constants;
    var TICK_MS = 1000 * K.DT;

    var cv = document.getElementById('cv');
    var ctx = cv.getContext('2d');
    var W = 0, H = 0, DPR = 1;

    var ui = 'menu';           // menu | playing | over
    var game = null;
    var level = 'medium';
    var aiMem = {};
    var acc = 0, last = 0;
    var pointTimer = 0;
    var trail = [];
    var seedCtr = 1;
    function rng() { seedCtr = (seedCtr * 1664525 + 1013904223) >>> 0; return seedCtr / 4294967296; }

    // ---------- sound (synthesized, no assets) ----------
    var Sound = (function () {
      var ctx = null, master = null;
      var enabled = localStorage.getItem('ttSnd') !== '0';
      function ac() {
        if (!ctx) {
          try {
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            var comp = ctx.createDynamicsCompressor();
            master = ctx.createGain();
            master.gain.value = 0.5;
            master.connect(comp);
            comp.connect(ctx.destination);
          } catch (e) { ctx = null; return null; }
        }
        if (ctx.state === 'suspended') ctx.resume();
        return ctx;
      }
      function out(pan) {
        if (ctx.createStereoPanner) {
          var p = ctx.createStereoPanner();
          p.pan.value = Math.max(-1, Math.min(1, pan || 0));
          p.connect(master);
          return p;
        }
        return master;
      }
      // Real recorded samples (ElevenLabs-generated, picked by ear); the
      // synth versions below stay as fallback if a sample fails to load.
      var samples = {};
      var SAMPLE_SRC = { hit: 'assets/hit.mp3?v=0.16.0', bounce: 'assets/bounce.mp3?v=0.16.0', cheer: 'assets/cheer.mp3?v=0.16.0', net: 'assets/net.mp3?v=0.16.0' };
      function loadSamples() {
        if (!ac()) return;
        Object.keys(SAMPLE_SRC).forEach(function (k) {
          if (samples[k] !== undefined) return;
          samples[k] = null; // loading
          fetch(SAMPLE_SRC[k])
            .then(function (r) { if (!r.ok) throw 0; return r.arrayBuffer(); })
            .then(function (ab) { return ctx.decodeAudioData(ab); })
            .then(function (b) { samples[k] = b; })
            .catch(function () { samples[k] = false; });
        });
      }
      function playSample(k, vol, rate, pan) {
        if (!enabled || !ac() || !samples[k]) return false;
        var src = ctx.createBufferSource();
        src.buffer = samples[k];
        src.playbackRate.value = rate || 1;
        var g = ctx.createGain();
        g.gain.value = vol;
        src.connect(g); g.connect(out(pan));
        src.start(ctx.currentTime);
        return true;
      }
      function blip(freq, dur, vol, type, pan, slide, delay) {
        if (!enabled || !ac()) return;
        var t0 = ctx.currentTime + (delay || 0);
        var o = ctx.createOscillator(), g = ctx.createGain();
        o.type = type || 'triangle';
        o.frequency.setValueAtTime(freq, t0);
        if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t0 + dur);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.connect(g); g.connect(out(pan));
        o.start(t0); o.stop(t0 + dur + 0.02);
      }
      function thwack(dur, vol, freq, pan) {
        if (!enabled || !ac()) return;
        var n = Math.floor(ctx.sampleRate * dur);
        var buf = ctx.createBuffer(1, n, ctx.sampleRate);
        var d = buf.getChannelData(0);
        for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
        var src = ctx.createBufferSource(); src.buffer = buf;
        var f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq; f.Q.value = 1.1;
        var g = ctx.createGain(); g.gain.value = vol;
        src.connect(f); f.connect(g); g.connect(out(pan));
        src.start(ctx.currentTime);
      }
      return {
        get enabled() { return enabled; },
        toggle: function () { enabled = !enabled; localStorage.setItem('ttSnd', enabled ? '1' : '0'); return enabled; },
        unlock: function () { ac(); loadSamples(); },
        // Real recorded pock; pitch + volume scale with shot power, small
        // random rate jitter so repeats never sound identical
        pock: function (power, pan) {
          if (playSample('hit', 0.55 + power * 0.45, 0.92 + power * 0.3 + (Math.random() - 0.5) * 0.08, pan)) return;
          thwack(0.016 + power * 0.012, 0.5 + power * 0.3, 1900 + power * 1600, pan);
          blip(130 + power * 60, 0.04, 0.35 + power * 0.2, 'sine', pan, -70);
        },
        bounce: function (pan) {
          if (playSample('bounce', 0.4, 0.95 + Math.random() * 0.1, pan)) return;
          thwack(0.012, 0.2, 900, pan);
          blip(95, 0.035, 0.18, 'sine', pan, -30);
        },
        net: function () {
          if (playSample('net', 0.75, 0.97 + Math.random() * 0.06, 0)) return;
          thwack(0.07, 0.35, 300, 0); blip(65, 0.08, 0.22, 'sine', 0, -20);
        },
        toss: function () { blip(500, 0.035, 0.07, 'sine', 0, 120); },
        point: function (mine) {
          if (mine && playSample('cheer', 0.55, 1 + (Math.random() - 0.5) * 0.06, 0)) return;
          blip(mine ? 523 : 330, 0.11, 0.16, 'sine', 0);
          blip(mine ? 784 : 262, 0.14, 0.16, 'sine', 0, 0, 0.1);
        },
        end: function (win) {
          [0, 0.13, 0.26].forEach(function (d, i) {
            blip(win ? 392 * Math.pow(1.26, i) : 330 / Math.pow(1.19, i), 0.15, 0.15, 'triangle', 0, 0, d);
          });
        }
      };
    })();

    // ---------- projection (2.5D) ----------
    var CAM = { d0: 1.1, depth: 1.9, hor: 0, A: 0, S: 0 };
    function resize() {
      DPR = Math.min(2, window.devicePixelRatio || 1);
      W = window.innerWidth; H = window.innerHeight;
      cv.width = W * DPR; cv.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      arenaCv = null; // rebuild the pre-rendered arena for the new size
      // Portrait squeezes the table long and thin — widen it and compress
      // the depth there; landscape keeps the deeper view.
      var portrait = H > W * 1.15;
      CAM.hor = H * (portrait ? 0.22 : 0.16);
      CAM.A = H * (portrait ? 0.52 : 0.68);
      CAM.S = portrait ? Math.min(W * 0.62, H * 0.46) : Math.min(W * 0.5, H * 0.64);
    }
    window.addEventListener('resize', resize);

    function dist(y) { return Math.max(0.2, CAM.d0 + (y / K.TABLE_L) * CAM.depth); }
    function ppm(y) { return CAM.S / dist(y); }        // pixels per meter at depth y
    function proj(x, y, z) {
      var d = dist(y);
      var s = CAM.S / d;
      return { x: W / 2 + x * s, y: CAM.hor + CAM.A / d - z * s * 0.75, s: s };
    }

    // ---------- rendering ----------
    // Pro-arena backdrop (red tournament floor, sponsor barriers, crowd
    // darkness, under-table LED glow) pre-rendered once per resize.
    var arenaCv = null;
    var arenaMeta = { crowdTop: 0, crowdBot: 0 };
    function buildArena() {
      arenaCv = document.createElement('canvas');
      arenaCv.width = W * DPR; arenaCv.height = H * DPR;
      var a = arenaCv.getContext('2d');
      a.setTransform(DPR, 0, 0, DPR, 0, 0);
      var s77 = 77;
      function arnd() { s77 = (s77 * 1664525 + 1013904223) >>> 0; return s77 / 4294967296; }

      // arena void above
      var sky = a.createLinearGradient(0, 0, 0, H * 0.45);
      sky.addColorStop(0, '#06050d'); sky.addColorStop(1, '#131024');
      a.fillStyle = sky; a.fillRect(0, 0, W, H * 0.5);

      var BARRIER_Y = K.TABLE_L + 1.25, BARRIER_H = 0.78;
      var bl = proj(-6, BARRIER_Y, 0), br = proj(6, BARRIER_Y, 0);
      var tl = proj(-6, BARRIER_Y, BARRIER_H), tr = proj(6, BARRIER_Y, BARRIER_H);

      // crowd darkness with silhouette heads, phone lights + camera dots
      var crowdTop = Math.max(0, tl.y - H * 0.17);
      arenaMeta.crowdTop = crowdTop; arenaMeta.crowdBot = tl.y;
      var cg = a.createLinearGradient(0, crowdTop, 0, tl.y);
      cg.addColorStop(0, '#0a0816'); cg.addColorStop(1, '#191430');
      a.fillStyle = cg; a.fillRect(0, crowdTop, W, tl.y - crowdTop);
      for (var row = 3; row >= 0; row--) {
        var ry = tl.y - 5 - row * H * 0.03;
        a.fillStyle = 'rgba(7,5,16,' + (0.92 - row * 0.16) + ')';
        for (var hx = -12; hx < W + 12; hx += 12 + row * 3) {
          var jx = hx + arnd() * 9, jr = 4.5 + arnd() * 3 + row * 1.4;
          a.beginPath(); a.arc(jx, ry, jr, Math.PI, 0); a.fill();
        }
      }
      for (var clx = 0; clx < 14; clx++) {
        var lr = arnd();
        a.fillStyle = lr > 0.7 ? 'rgba(255,90,90,0.8)' : (lr > 0.35 ? 'rgba(215,232,255,0.65)' : 'rgba(140,190,255,0.5)');
        a.beginPath(); a.arc(arnd() * W, crowdTop + arnd() * (tl.y - crowdTop) * 0.7, 1.2 + arnd(), 0, Math.PI * 2); a.fill();
      }

      // lighting truss with spotlights above the crowd
      var trussY = Math.max(8, crowdTop * 0.45);
      a.fillStyle = '#0c0a18';
      a.fillRect(0, trussY, W, 5);
      for (var sp = 0; sp < 5; sp++) {
        var sx2 = W * (0.12 + sp * 0.19);
        a.fillStyle = '#1a1730';
        a.fillRect(sx2 - 5, trussY + 5, 10, 8);
        var lg = a.createRadialGradient(sx2, trussY + 14, 1, sx2, trussY + 14, 9);
        lg.addColorStop(0, 'rgba(255,250,220,0.95)'); lg.addColorStop(1, 'rgba(255,250,220,0)');
        a.fillStyle = lg;
        a.beginPath(); a.arc(sx2, trussY + 14, 9, 0, Math.PI * 2); a.fill();
      }
      // two volumetric light cones onto the table area
      [-0.24, 0.24].forEach(function (fx) {
        var cxTop = W / 2 + W * fx, cyTop = trussY + 16;
        var mid = proj(fx * 3, K.NET_Y, 0);
        var cone = a.createLinearGradient(0, cyTop, 0, mid.y);
        cone.addColorStop(0, 'rgba(190,220,255,0.10)');
        cone.addColorStop(1, 'rgba(190,220,255,0.0)');
        a.fillStyle = cone;
        a.beginPath();
        a.moveTo(cxTop - 8, cyTop);
        a.lineTo(cxTop + 8, cyTop);
        a.lineTo(mid.x + ppm(K.NET_Y) * 1.5, mid.y);
        a.lineTo(mid.x - ppm(K.NET_Y) * 1.5, mid.y);
        a.closePath(); a.fill();
      });

      // tournament floor
      var fg = a.createLinearGradient(0, bl.y, 0, H);
      fg.addColorStop(0, '#8e2a1e'); fg.addColorStop(0.45, '#a63526'); fg.addColorStop(1, '#5a1911');
      a.fillStyle = fg; a.fillRect(0, bl.y - 1, W, H - bl.y + 1);
      // court zone marking
      var c1 = proj(-2.2, -0.9, 0), c2 = proj(2.2, -0.9, 0), c3 = proj(2.2, BARRIER_Y - 0.06, 0), c4 = proj(-2.2, BARRIER_Y - 0.06, 0);
      a.fillStyle = 'rgba(255,120,70,0.10)';
      a.beginPath(); a.moveTo(c1.x, c1.y); a.lineTo(c2.x, c2.y); a.lineTo(c3.x, c3.y); a.lineTo(c4.x, c4.y); a.closePath(); a.fill();
      a.strokeStyle = 'rgba(255,255,255,0.13)'; a.lineWidth = 2; a.stroke();

      // event branding painted flat on the floor behind the table
      a.save();
      var fb2 = proj(0, 3.45, 0);
      a.translate(fb2.x, fb2.y);
      a.scale(1, 0.4);
      a.fillStyle = 'rgba(255,255,255,0.16)';
      a.font = '800 ' + ppm(3.45) * 0.34 + 'px "Segoe UI", system-ui, sans-serif';
      a.textAlign = 'center'; a.textBaseline = 'middle';
      a.fillText('GAMEVOLT OPEN', 0, 0);
      a.restore();

      // FAR BARRIER: full-bleed sponsor panels, rink-style
      var ADS = [
        { t: 'GAMEVOLT.IO', bg: '#101c3a', fg: '#00eaff' },
        { t: 'VOLT+', bg: '#ece9e2', fg: '#c8281e' },
        { t: 'SPINTEC', bg: '#12266b', fg: '#ffffff' },
        { t: 'AEROPONG', bg: '#ece9e2', fg: '#12266b' },
        { t: 'TOPSPIN PRO', bg: '#c8281e', fg: '#ffffff' },
        { t: 'PING&CO', bg: '#101c3a', fg: '#ffd166' }
      ];
      var n = ADS.length;
      for (var i = 0; i < n; i++) {
        var x0 = bl.x + (br.x - bl.x) * (i / n), x1 = bl.x + (br.x - bl.x) * ((i + 1) / n);
        a.fillStyle = ADS[i].bg;
        a.fillRect(x0, tl.y, x1 - x0, bl.y - tl.y);
        a.fillStyle = 'rgba(0,0,0,0.25)';
        a.fillRect(x1 - 1.5, tl.y, 1.5, bl.y - tl.y); // panel seam
        a.fillStyle = ADS[i].fg;
        a.font = '800 ' + (bl.y - tl.y) * 0.56 + 'px "Segoe UI", system-ui, sans-serif';
        a.textAlign = 'center'; a.textBaseline = 'middle';
        a.fillText(ADS[i].t, (x0 + x1) / 2, (tl.y + bl.y) / 2 + 1, (x1 - x0) * 0.9);
      }
      // white top tape + soft shadow the barrier casts onto the floor
      a.fillStyle = 'rgba(255,255,255,0.9)';
      a.fillRect(Math.max(0, bl.x), tl.y - 2.5, Math.min(W, br.x) - Math.max(0, bl.x), 2.5);
      var fsh = a.createLinearGradient(0, bl.y, 0, bl.y + 12);
      fsh.addColorStop(0, 'rgba(0,0,0,0.35)'); fsh.addColorStop(1, 'rgba(0,0,0,0)');
      a.fillStyle = fsh;
      a.fillRect(0, bl.y, W, 12);

      // SIDE BARRIERS: perspective ad panels filling the full board height
      function sidePanels(sx, panels) {
        var yStops = [-0.55, 1.05, 2.45, BARRIER_Y];
        for (var p2 = 0; p2 < panels.length; p2++) {
          var y0 = yStops[p2], y1 = yStops[p2 + 1];
          var b0 = proj(sx, y0, 0), b1 = proj(sx, y1, 0);
          var t0 = proj(sx, y0, BARRIER_H), t1 = proj(sx, y1, BARRIER_H);
          a.fillStyle = panels[p2].bg;
          a.beginPath();
          a.moveTo(b0.x, b0.y); a.lineTo(b1.x, b1.y); a.lineTo(t1.x, t1.y); a.lineTo(t0.x, t0.y);
          a.closePath(); a.fill();
          a.strokeStyle = 'rgba(0,0,0,0.28)'; a.lineWidth = 1.5;
          a.beginPath(); a.moveTo(b1.x, b1.y); a.lineTo(t1.x, t1.y); a.stroke();
          // depth-scaled text along the board
          var ym = (y0 + y1) / 2;
          var bm = proj(sx, ym, 0), tm = proj(sx, ym, BARRIER_H);
          var panelLen = Math.hypot(b1.x - b0.x, b1.y - b0.y);
          a.save();
          a.translate((bm.x + tm.x) / 2, (bm.y + tm.y) / 2);
          var ang = Math.atan2(b1.y - b0.y, b1.x - b0.x);
          if (ang > Math.PI / 2 || ang < -Math.PI / 2) ang += Math.PI; // keep text upright
          a.rotate(ang);
          a.fillStyle = panels[p2].fg;
          a.font = '800 ' + Math.abs(bm.y - tm.y) * 0.5 + 'px "Segoe UI", system-ui, sans-serif';
          a.textAlign = 'center'; a.textBaseline = 'middle';
          a.fillText(panels[p2].t, 0, 0, panelLen * 0.86);
          a.restore();
        }
        // top tape + floor shadow along the board
        var st0 = proj(sx, -0.55, BARRIER_H), st1 = proj(sx, BARRIER_Y, BARRIER_H);
        a.strokeStyle = 'rgba(255,255,255,0.85)'; a.lineWidth = 2;
        a.beginPath(); a.moveTo(st0.x, st0.y); a.lineTo(st1.x, st1.y); a.stroke();
        var sb0 = proj(sx, -0.55, 0), sb1 = proj(sx, BARRIER_Y, 0);
        var inward = sx < 0 ? 9 : -9;
        a.fillStyle = 'rgba(0,0,0,0.22)';
        a.beginPath();
        a.moveTo(sb0.x, sb0.y); a.lineTo(sb1.x, sb1.y);
        a.lineTo(sb1.x + inward * 0.4, sb1.y + 3); a.lineTo(sb0.x + inward, sb0.y + 6);
        a.closePath(); a.fill();
      }
      sidePanels(-2.6, [
        { t: 'SMASH ENERGY', bg: '#c8281e', fg: '#ffffff' },
        { t: 'GRIDBURN', bg: '#0b1226', fg: '#00eaff' },
        { t: 'VOLT+', bg: '#ece9e2', fg: '#c8281e' }
      ]);
      sidePanels(2.6, [
        { t: 'VOLTARENA', bg: '#12266b', fg: '#ffffff' },
        { t: 'HOVERDASH', bg: '#1a0b22', fg: '#ff4dd2' },
        { t: 'SPINTEC', bg: '#ece9e2', fg: '#12266b' }
      ]);

      // floor reflection of the table below its near edge
      var hw2 = K.TABLE_W / 2;
      var rn = proj(-hw2, 0, 0), rr = proj(hw2, 0, 0);
      var reflH = H * 0.13;
      var refl = a.createLinearGradient(0, rn.y, 0, rn.y + reflH);
      refl.addColorStop(0, 'rgba(26,116,232,0.16)');
      refl.addColorStop(1, 'rgba(26,116,232,0)');
      a.fillStyle = refl;
      a.beginPath();
      a.moveTo(rn.x, rn.y); a.lineTo(rr.x, rr.y);
      a.lineTo(rr.x - (rr.x - rn.x) * 0.06, rn.y + reflH);
      a.lineTo(rn.x + (rr.x - rn.x) * 0.06, rn.y + reflH);
      a.closePath(); a.fill();

      // under-table LED glow, static base (pulse layered per frame)
      var gp = proj(0, 1.35, K.FLOOR_Z);
      var glow = a.createRadialGradient(gp.x, gp.y, 8, gp.x, gp.y, ppm(1.35) * 1.9);
      glow.addColorStop(0, 'rgba(0,200,255,0.28)');
      glow.addColorStop(0.5, 'rgba(0,130,255,0.10)');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      a.fillStyle = glow;
      a.fillRect(0, H * 0.32, W, H * 0.68);

      // broadcast vignette
      var vin = a.createRadialGradient(W / 2, H * 0.55, Math.min(W, H) * 0.45, W / 2, H * 0.55, Math.max(W, H) * 0.85);
      vin.addColorStop(0, 'rgba(0,0,0,0)'); vin.addColorStop(1, 'rgba(0,0,0,0.32)');
      a.fillStyle = vin;
      a.fillRect(0, 0, W, H);
    }

    // live camera flashes popping in the crowd
    var flashes = [];
    function drawFlashes() {
      if (Math.random() < 0.016 && flashes.length < 3 && arenaMeta.crowdBot > 0) {
        flashes.push({ x: Math.random() * W, y: arenaMeta.crowdTop + Math.random() * (arenaMeta.crowdBot - arenaMeta.crowdTop) * 0.7, life: 1 });
      }
      for (var i = flashes.length - 1; i >= 0; i--) {
        var f = flashes[i];
        var fr = 5 + (1 - f.life) * 8;
        var fgl = ctx.createRadialGradient(f.x, f.y, 0.5, f.x, f.y, fr);
        fgl.addColorStop(0, 'rgba(255,255,255,' + (0.85 * f.life) + ')');
        fgl.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = fgl;
        ctx.beginPath(); ctx.arc(f.x, f.y, fr, 0, Math.PI * 2); ctx.fill();
        f.life -= 0.09;
        if (f.life <= 0) flashes.splice(i, 1);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      if (!arenaCv) buildArena();
      ctx.drawImage(arenaCv, 0, 0, W, H);
      // gentle breathing of the under-table light
      var gp2 = proj(0, 1.35, K.FLOOR_Z);
      var pulse = 0.09 + 0.045 * Math.sin(performance.now() / 900);
      var pg = ctx.createRadialGradient(gp2.x, gp2.y, 6, gp2.x, gp2.y, ppm(1.35) * 1.35);
      pg.addColorStop(0, 'rgba(0,220,255,' + pulse.toFixed(3) + ')');
      pg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = pg;
      ctx.fillRect(0, H * 0.3, W, H * 0.7);

      drawFlashes();

      if (!game) return;
      var b = game.ball;
      var hw = K.TABLE_W / 2;

      // table drop shadow on the floor
      var shNear = proj(0, 0.15, K.FLOOR_Z), shFar = proj(0, K.TABLE_L - 0.15, K.FLOOR_Z);
      ctx.fillStyle = 'rgba(0,0,0,0.42)';
      trapezoid(-hw * 1.06, 0.1, hw * 1.06, K.TABLE_L - 0.1, K.FLOOR_Z);
      ctx.fill();

      drawFarPaddle();

      // sculptural golden pedestal base (pro-table style) with LED rim
      [0.62, K.TABLE_L - 0.62].forEach(function (yy) {
        var top = proj(0, yy, -0.06);
        var bot = proj(0, yy, K.FLOOR_Z);
        var wTop = 0.5 * ppm(yy), wBot = 1.05 * ppm(yy);
        var gold = ctx.createLinearGradient(top.x - wBot / 2, 0, top.x + wBot / 2, 0);
        gold.addColorStop(0, '#6b4d0e'); gold.addColorStop(0.42, '#e8b83a');
        gold.addColorStop(0.58, '#c2922a'); gold.addColorStop(1, '#5c420c');
        ctx.fillStyle = gold;
        ctx.beginPath();
        ctx.moveTo(top.x - wTop / 2, top.y);
        ctx.bezierCurveTo(top.x - wBot * 0.72, top.y + (bot.y - top.y) * 0.45, top.x - wBot / 2, bot.y - 6, top.x - wBot / 2, bot.y);
        ctx.lineTo(top.x + wBot / 2, bot.y);
        ctx.bezierCurveTo(top.x + wBot / 2, bot.y - 6, top.x + wBot * 0.72, top.y + (bot.y - top.y) * 0.45, top.x + wTop / 2, top.y);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(0,220,255,0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(top.x - wBot / 2, bot.y - 1); ctx.lineTo(top.x + wBot / 2, bot.y - 1); ctx.stroke();
      });

      // table top slab side (front face) with LED strip underneath
      var nl = proj(-hw, 0, 0), nr = proj(hw, 0, 0);
      var slabH = 0.055 * ppm(0);
      ctx.fillStyle = '#0a2d66';
      ctx.beginPath();
      ctx.moveTo(nl.x, nl.y); ctx.lineTo(nr.x, nr.y);
      ctx.lineTo(nr.x, nr.y + slabH); ctx.lineTo(nl.x, nl.y + slabH);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(0,220,255,0.55)';
      ctx.fillRect(nl.x, nl.y + slabH, nr.x - nl.x, 2);

      // table surface with a subtle broadcast-light sheen
      var g2 = ctx.createLinearGradient(0, proj(0, K.TABLE_L, 0).y, 0, nl.y);
      g2.addColorStop(0, '#0f56b8'); g2.addColorStop(1, '#1a74e8');
      ctx.fillStyle = g2;
      trapezoid(-hw, 0, hw, K.TABLE_L, 0);
      ctx.fill();
      var sheen = ctx.createLinearGradient(0, proj(0, K.TABLE_L, 0).y, 0, nl.y);
      sheen.addColorStop(0, 'rgba(255,255,255,0.10)');
      sheen.addColorStop(0.4, 'rgba(255,255,255,0.02)');
      sheen.addColorStop(1, 'rgba(255,255,255,0.06)');
      ctx.fillStyle = sheen;
      trapezoid(-hw, 0, hw, K.TABLE_L, 0);
      ctx.fill();

      // lines
      ctx.strokeStyle = 'rgba(255,255,255,0.92)';
      ctx.lineWidth = Math.max(1.5, 0.02 * ppm(K.NET_Y));
      trapezoid(-hw, 0, hw, K.TABLE_L, 0); ctx.stroke();
      line3(0, 0.02, 0, 0, K.TABLE_L - 0.02, 0); // center line

      // ball shadow
      var overTable = Math.abs(b.x) <= hw && b.y >= 0 && b.y <= K.TABLE_L;
      var shz = overTable ? 0 : K.FLOOR_Z;
      if (b.z > shz - 0.02) {
        var sp2 = proj(b.x, b.y, shz);
        var sr = Math.max(0.5, 0.05 * sp2.s * (1 - Math.min(0.65, (b.z - shz) * 0.55)));
        ctx.fillStyle = 'rgba(0,0,0,' + (0.34 - Math.min(0.24, (b.z - shz) * 0.18)) + ')';
        ctx.beginPath(); ctx.ellipse(sp2.x, sp2.y, sr * 1.5, sr * 0.5, 0, 0, Math.PI * 2); ctx.fill();
      }

      var ballBehindNet = b.y > K.NET_Y;
      if (ballBehindNet) drawBall();
      drawNet();
      if (!ballBehindNet) drawBall();

      drawNearPaddle();
    }

    function trapezoid(x0, y0, x1, y1, z) {
      var a = proj(x0, y0, z), b2 = proj(x1, y0, z), c = proj(x1, y1, z), d = proj(x0, y1, z);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y); ctx.lineTo(b2.x, b2.y); ctx.lineTo(c.x, c.y); ctx.lineTo(d.x, d.y);
      ctx.closePath();
    }
    function line3(x0, y0, z0, x1, y1, z1) {
      var a = proj(x0, y0, z0), b2 = proj(x1, y1, z1);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b2.x, b2.y); ctx.stroke();
    }

    function drawNet() {
      var hw = K.TABLE_W / 2 + 0.12;
      var bl = proj(-hw, K.NET_Y, 0), br = proj(hw, K.NET_Y, 0);
      var tl = proj(-hw, K.NET_Y, K.NET_H), tr = proj(hw, K.NET_Y, K.NET_H);
      // mesh
      ctx.fillStyle = 'rgba(20,26,50,0.55)';
      ctx.beginPath();
      ctx.moveTo(bl.x, bl.y); ctx.lineTo(br.x, br.y); ctx.lineTo(tr.x, tr.y); ctx.lineTo(tl.x, tl.y);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(190,210,255,0.28)';
      ctx.lineWidth = 1;
      var n = 22;
      for (var i = 0; i <= n; i++) {
        var f = i / n;
        var bx = bl.x + (br.x - bl.x) * f, by = bl.y + (br.y - bl.y) * f;
        var tx = tl.x + (tr.x - tl.x) * f, ty = tl.y + (tr.y - tl.y) * f;
        ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(tx, ty); ctx.stroke();
      }
      // tape + posts
      ctx.strokeStyle = 'rgba(255,255,255,0.95)';
      ctx.lineWidth = Math.max(1.5, 0.014 * ppm(K.NET_Y));
      ctx.beginPath(); ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y); ctx.stroke();
      ctx.lineWidth = Math.max(2, 0.02 * ppm(K.NET_Y));
      ctx.strokeStyle = '#3b4368';
      ctx.beginPath(); ctx.moveTo(bl.x, bl.y); ctx.lineTo(tl.x, tl.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(br.x, br.y); ctx.lineTo(tr.x, tr.y); ctx.stroke();
    }

    function drawBall() {
      var b = game.ball;
      var tz = game.phase === 'serve' ? tossHeight() : 0;
      if (tz) {
        var tp2 = proj(b.x, b.y, b.z + tz);
        var tr2 = Math.max(3, 0.045 * tp2.s);
        var tg = ctx.createRadialGradient(tp2.x - tr2 * 0.35, tp2.y - tr2 * 0.4, tr2 * 0.15, tp2.x, tp2.y, tr2);
        tg.addColorStop(0, '#fff6e0'); tg.addColorStop(0.45, '#ffb020'); tg.addColorStop(1, '#b35c00');
        ctx.fillStyle = tg;
        ctx.beginPath(); ctx.arc(tp2.x, tp2.y, tr2, 0, Math.PI * 2); ctx.fill();
        return;
      }
      // motion trail
      for (var i = 0; i < trail.length; i++) {
        var t = trail[i];
        var tp = proj(t.x, t.y, t.z);
        ctx.fillStyle = 'rgba(255,176,32,' + (0.05 + 0.05 * i) + ')';
        ctx.beginPath(); ctx.arc(tp.x, tp.y, 0.045 * tp.s * (0.5 + 0.1 * i), 0, Math.PI * 2); ctx.fill();
      }
      var p = proj(b.x, b.y, b.z);
      var r = Math.max(3, 0.045 * p.s);
      var g3 = ctx.createRadialGradient(p.x - r * 0.35, p.y - r * 0.4, r * 0.15, p.x, p.y, r);
      g3.addColorStop(0, '#fff6e0'); g3.addColorStop(0.45, '#ffb020'); g3.addColorStop(1, '#b35c00');
      ctx.fillStyle = g3;
      ctx.beginPath();
      // squash on bounce (set in tickGame, decays in the loop)
      ctx.ellipse(p.x, p.y, r * (1 + 0.32 * ballSquash), r * (1 - 0.38 * ballSquash), 0, 0, Math.PI * 2);
      ctx.fill();
    }
    var ballSquash = 0;

    function paddleShape(px, py, pz, scale, color, dark, tilt) {
      var p = proj(px, py, pz);
      var r = scale * p.s;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(tilt);
      // handle
      ctx.fillStyle = '#c9913f';
      ctx.fillRect(-r * 0.13, r * 0.55, r * 0.26, r * 0.95);
      ctx.fillStyle = '#a9752c';
      ctx.fillRect(-r * 0.13, r * 0.55, r * 0.26, r * 0.18);
      // blade
      var bg = ctx.createRadialGradient(-r * 0.25, -r * 0.25, r * 0.2, 0, 0, r);
      bg.addColorStop(0, color); bg.addColorStop(1, dark);
      ctx.fillStyle = bg;
      ctx.beginPath(); ctx.ellipse(0, 0, r * 0.78, r * 0.88, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = Math.max(1, r * 0.05);
      ctx.stroke();
      ctx.restore();
    }
    var padTilt = 0, padKick = 0;
    function drawNearPaddle() {
      var pad = game.paddles[1];
      // lean into the reach — near-HORIZONTAL at full stretch — plus swing
      var xm = Math.min(1.5, (W / 2 - 52) / ppm(0));
      var target = Math.max(-1.55, Math.min(1.55, (pad.x / xm) * 1.5 + pointerVX * 0.05));
      padTilt += (target - padTilt) * 0.18;
      padKick *= 0.85;
      paddleShape(pad.x, K.PADDLE_Y[1], pad.z, 0.18, '#ff4d4d', '#a3122a', padTilt + padKick);
    }
    function drawFarPaddle() {
      var pad = game.paddles[2];
      paddleShape(pad.x, K.PADDLE_Y[2], pad.z, 0.17, '#3aa0ff', '#134a91',
        Math.max(-1.2, Math.min(1.2, -pad.x * 0.9)));
    }

    // ---------- input ----------
    var pointer = { x: 0, z: 0.25, down: false };
    var pointerVX = 0, pointerVZ = 0;
    var lastPX = null, lastPT = 0;

    function toWorld(clientX, clientY) {
      // 1.4x lateral gain: side balls are reachable without dragging the
      // finger across the whole screen
      return {
        x: (clientX - W / 2) / ppm(0) * 1.4,
        z: Math.max(0.02, Math.min(0.8, (H * 0.9 - clientY) / (H * 0.5) * 0.8))
      };
    }
    function onMove(clientX, clientY, ts) {
      var w = toWorld(clientX, clientY);
      if (lastPX !== null && ts > lastPT) {
        var dt = Math.min(0.1, (ts - lastPT) / 1000);
        if (dt > 0.001) {
          pointerVX = pointerVX * 0.65 + ((w.x - pointer.x) / dt) * 0.35;
          pointerVZ = pointerVZ * 0.65 + ((w.z - pointer.z) / dt) * 0.35;
        }
      }
      var xMax = Math.min(1.5, (W / 2 - 52) / ppm(0)); // keep the paddle on screen
      pointer.x = Math.max(-xMax, Math.min(xMax, w.x));
      pointer.z = w.z;
      lastPX = clientX; lastPT = ts;
    }
    cv.addEventListener('pointermove', function (e) { onMove(e.clientX, e.clientY, performance.now()); });
    cv.addEventListener('pointerdown', function (e) {
      Sound.unlock();
      onMove(e.clientX, e.clientY, performance.now());
      if (ui === 'playing' && game && game.phase === 'serve' && game.server === 1) humanServe();
    });
    cv.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

    function humanAim() {
      // Physical return model: the swing IS the shot. Direction from the
      // swipe (plus where the ball meets the blade — the core adds that
      // deflection); pace from swipe speed AND the incoming ball's speed,
      // so blocking a rocket pops it back fast. Overcooking a LOW ball
      // flies long — full power is safe on high balls, risky on low ones.
      var raw = Math.abs(pointerVX) + Math.abs(pointerVZ) * 1.6;
      var power = Math.min(1, Math.pow(Math.max(0, raw - 0.45) / 3.2, 0.9));
      var inSpeed = game && game.ball ? Math.min(1, Math.abs(game.ball.vy) / 7) : 0;
      var bz = game && game.ball ? game.ball.z : 0.25;
      var lowRisk = Math.max(0, Math.min(1, 1 - bz / 0.45));
      return {
        // full power on a HIGH ball lands deep but IN (~2.65 of 2.74);
        // only overcooking a LOW ball flies long
        tx: Math.max(-0.72, Math.min(0.72, game.paddles[1].x * 0.2 + pointerVX * 0.6)),
        ty: K.NET_Y + 0.30 + 0.88 * power + 0.10 * inSpeed + 0.32 * lowRisk * power,
        t: (0.70 - 0.30 * power) * (1 - 0.2 * inSpeed)
      };
    }
    function humanServe() {
      beginToss(null); // aim is read from the swipe at the STRIKE, not the tap
    }

    // Serve toss: the ball is thrown up from the paddle and struck on the
    // way down (cosmetic — the core fires the actual serve at the strike).
    var toss = null; // { t, dur, aim }
    function beginToss(aim) {
      if (toss) return;
      toss = { t: 0, dur: 46, aim: aim };
      Sound.toss();
      setHint('');
    }
    function tossHeight() {
      if (!toss) return 0;
      var f = toss.t / toss.dur;
      return 4 * 0.85 * f * (1 - f); // parabola: up 0.85m and back down
    }

    // ---------- ui helpers ----------
    var el = {
      menu: document.getElementById('menu'), end: document.getElementById('end'),
      hud: document.getElementById('hud'), banner: document.getElementById('banner'),
      hint: document.getElementById('hint'),
      sc1: document.getElementById('sc1'), sc2: document.getElementById('sc2'),
      dot1: document.getElementById('dot1'), dot2: document.getElementById('dot2'),
      lvl: document.getElementById('lvl'),
      endTitle: document.getElementById('end-title'), endSub: document.getElementById('end-sub')
    };
    function updateHud() {
      el.sc1.textContent = game.scores[1];
      el.sc2.textContent = game.scores[2];
      el.dot1.textContent = game.server === 1 ? '●' : '';
      el.dot2.textContent = game.server === 2 ? '●' : '';
      el.lvl.textContent = level.toUpperCase();
    }
    var bannerTimer = 0;
    function showBanner(txt, ms) {
      el.banner.textContent = txt;
      el.banner.classList.add('on');
      clearTimeout(bannerTimer);
      bannerTimer = setTimeout(function () { el.banner.classList.remove('on'); }, ms || 800);
    }
    function setHint(txt) {
      el.hint.textContent = txt;
      el.hint.classList.toggle('on', !!txt);
    }

    // ---------- game flow ----------
    function startMatch(lvl) {
      level = lvl;
      game = TTCore.createGame(1);
      aiMem = {};
      trail = [];
      toss = null;
      pointTimer = 0;
      ui = 'playing';
      el.menu.classList.add('hidden');
      el.end.classList.add('hidden');
      el.hud.classList.remove('hidden');
      updateHud();
      setHint('TAP TO TOSS · SWIPE TO STRIKE');
      last = 0; acc = 0;
      requestAnimationFrame(loop);
    }

    function endMatch() {
      ui = 'over';
      var won = game.winner === 1;
      el.endTitle.textContent = won ? 'YOU WIN!' : 'AI WINS';
      el.endTitle.className = 'modal-title ' + (won ? 'win' : 'lose');
      el.endSub.textContent = game.scores[1] + ' — ' + game.scores[2] + ' · ' + level.toUpperCase();
      setHint('');
      setTimeout(function () { el.end.classList.remove('hidden'); }, 700);
    }

    function toMenu() {
      ui = 'menu';
      game = null;
      el.end.classList.add('hidden');
      el.hud.classList.add('hidden');
      el.menu.classList.remove('hidden');
      setHint('');
      draw();
    }

    function tickGame() {
      if (toss) {
        toss.t++;
        var f = toss.t / toss.dur;
        var wasHuman = game.server === 1;
        var raw = Math.abs(pointerVX) + Math.abs(pointerVZ) * 1.6;
        if (wasHuman && !toss.aim) {
          // YOU pick the strike moment: once the toss is falling, a swipe
          // ARMS the strike; it fires a few ticks later so the swipe's full
          // speed registers (firing on the leading edge reads as soft)
          if (toss.strikeAt === undefined && f >= 0.62 && raw > 1.1) { toss.strikeAt = toss.t + 4; toss.peak = raw; }
          if (toss.strikeAt !== undefined && raw > toss.peak) toss.peak = raw;
        }
        if ((toss.strikeAt !== undefined && toss.t >= toss.strikeAt) || toss.t >= toss.dur) {
          var aim = toss.aim; // the AI decides its serve upfront…
          if (!aim) {
            // …the human's serve is the swipe: direction + paddle position
            // place it, peak swipe speed = pace
            var eff = toss.peak !== undefined ? toss.peak : raw;
            var power = Math.min(1, Math.max(0, eff - 0.9) / 2.4);
            aim = {
              tx: Math.max(-0.65, Math.min(0.65, game.paddles[1].x * 0.3 + pointerVX * 0.5)),
              ty: K.NET_Y + 0.55 + 0.85 * power,
              pace: power,
              lift: toss.strikeAt !== undefined ? tossHeight() : 0
            };
          }
          TTCore.serve(game, aim);
          Sound.pock(Math.min(1, (aim.pace || 0.2) + 0.15), game.ball.x / 0.76);
          toss = null;
          if (wasHuman) padKick = 0.55; // strike swing
        }
      }
      var inputs = { 1: { x: pointer.x, z: pointer.z, aim: humanAim() } };
      var ai = TTAi.decide(game, 2, level, rng, aiMem);
      if (game.phase === 'serve' && game.server === 2 && ai.serve) beginToss(ai.serve);
      inputs[2] = ai;
      var res = TTCore.step(game, inputs);
      for (var i = 0; i < res.events.length; i++) {
        var e = res.events[i];
        if (e.type === 'hit') {
          Sound.pock(Math.min(1, Math.abs(game.ball.vy) / 7.5), e.x / 0.76);
          if (e.by === 1) padKick = Math.max(-0.6, Math.min(0.6, pointerVX * 0.14));
        }
        if (e.type === 'bounce') { Sound.bounce(e.x / 0.76); ballSquash = 1; }
        if (e.type === 'net') { Sound.net(); showBanner('NET!'); }
        else if (e.type === 'point') {
          Sound.point(e.to === 1);
          updateHud();
          if (!res.events.some(function (x) { return x.type === 'over'; })) {
            showBanner(e.to === 1 ? 'YOUR POINT' : 'AI POINT', 850);
          }
          pointTimer = 66; // ~1.1s pause, ball physics keep settling
        } else if (e.type === 'over') {
          Sound.end(e.winner === 1);
          showBanner(e.winner === 1 ? 'GAME — YOU!' : 'GAME — AI', 1400);
          endMatch();
        }
      }
      if (game.phase === 'point' && pointTimer > 0 && --pointTimer === 0) {
        TTCore.nextRally(game);
        aiMem = {};
        updateHud();
        if (game.server === 1) setHint('TAP TO TOSS · SWIPE TO STRIKE');
      }
      // ball trail bookkeeping
      if (game.phase === 'rally') {
        if (game.tick % 2 === 0) {
          trail.push({ x: game.ball.x, y: game.ball.y, z: game.ball.z });
          if (trail.length > 4) trail.shift();
        }
      } else if (trail.length) trail = [];
    }

    function loop(ts) {
      if (ui !== 'playing' && ui !== 'over') return;
      if (!last) last = ts;
      var dt = ts - last; last = ts;
      acc += dt;
      var steps = 0;
      while (acc >= TICK_MS && ui === 'playing') {
        if (++steps > 10) { acc = 0; break; }
        acc -= TICK_MS;
        tickGame();
      }
      // pointer velocity decays when the finger rests
      pointerVX *= 0.92; pointerVZ *= 0.92;
      ballSquash *= 0.8;
      draw();
      requestAnimationFrame(loop);
    }

    // ---------- wiring ----------
    Array.prototype.forEach.call(document.querySelectorAll('[data-level]'), function (b) {
      b.addEventListener('click', function () { startMatch(b.getAttribute('data-level')); });
    });
    document.getElementById('again-btn').addEventListener('click', function () { startMatch(level); });
    document.getElementById('menu-btn').addEventListener('click', toMenu);
    window.addEventListener('keydown', function (e) {
      if (e.code === 'Escape' && ui === 'playing') toMenu();
    });

    document.getElementById('version').textContent = 'v' + VERSION + ' · prototype';
    var sndBtn = document.getElementById('snd-btn');
    function updSnd() { sndBtn.textContent = Sound.enabled ? '🔊' : '🔇'; }
    sndBtn.addEventListener('click', function () { Sound.unlock(); Sound.toggle(); updSnd(); });
    updSnd();

    // ---------- PWA: install button, iOS hint, update chip ----------
    var installBtn = document.getElementById('install-btn');
    var iosHint = document.getElementById('ios-hint');
    var updateChip = document.getElementById('update-chip');
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    var deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      deferredPrompt = e;
      if (!isStandalone) installBtn.classList.remove('hidden');
    });
    installBtn.addEventListener('click', function () {
      if (!deferredPrompt) return;
      installBtn.classList.add('hidden');
      deferredPrompt.prompt();
      deferredPrompt = null;
    });
    window.addEventListener('appinstalled', function () { installBtn.classList.add('hidden'); deferredPrompt = null; });
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isIOS && !/crios|fxios/i.test(navigator.userAgent) && !isStandalone) iosHint.classList.remove('hidden');

    // service worker + "new version available" flow (same as Vector Hexagon)
    var userTriggeredUpdate = false;
    function showUpdate(worker) {
      updateChip.classList.remove('hidden');
      updateChip.onclick = function () {
        updateChip.textContent = 'UPDATING…';
        userTriggeredUpdate = true;
        worker.postMessage('skipWaiting'); // SW activates -> controllerchange -> reload
      };
    }
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (reg) {
          // a worker already waiting from a previous visit
          if (reg.waiting && navigator.serviceWorker.controller) showUpdate(reg.waiting);
          reg.addEventListener('updatefound', function () {
            var nw = reg.installing; if (!nw) return;
            nw.addEventListener('statechange', function () {
              // installed + a controller already exists => UPDATE, not first install
              if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdate(nw);
            });
          });
          // proactive update checks: shortly after launch (installed PWAs
          // don't reliably check on navigation) and every 30 min while open
          setTimeout(function () {
            reg.update().catch(function () {});
            if (reg.waiting && navigator.serviceWorker.controller) showUpdate(reg.waiting);
          }, 4000);
          setInterval(function () { reg.update().catch(function () {}); }, 1800000);
        }).catch(function () {});
        // reload ONLY when the user opted into the update (not on first-visit claim)
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (userTriggeredUpdate) location.reload();
        });
      });
    }

    // Dev/debug handle
    window.__TT_DEBUG = {
      get ui() { return ui; },
      get game() { return game; },
      get level() { return level; }
    };

    resize();
    draw();
  </script>
</body>
</html>
