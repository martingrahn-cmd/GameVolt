<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in... — GameVolt</title>
  <meta name="description" content="Completing your GameVolt sign-in. You will be redirected shortly.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <style>
    body { margin: 0; background: #0a0a1a; color: #fff; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .wrap { text-align: center; }
    .logo { font-size: 22px; font-weight: bold; letter-spacing: 3px; color: #00e5ff; margin-bottom: 16px; }
    .msg { color: #999; font-size: 14px; }
    .error { color: #f44336; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">GAMEVOLT</div>
    <p class="msg" id="msg">Signing you in...</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // Supabase project credentials — the anon key is public by design (RLS-protected)
    var SUPABASE_URL = 'https://nwkjayseuhvvpkdgpivm.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53a2pheXNldWh2dnBrZGdwaXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzQxMzYsImV4cCI6MjA4Nzk1MDEzNn0.lGCRdYlgxWJlzM6_XpML3f8AKUJG3tLmzNRLTPR0TnU';

    var msgEl = document.getElementById('msg');

    // Supabase puts errors (expired/invalid/consumed link) in the URL — as a
    // query string OR the hash fragment. Surface the real reason instead of a
    // generic "couldn't sign in", so a dead magic link is diagnosable. Checked
    // before the client is created since it needs nothing but the URL.
    function urlError() {
      var q = new URLSearchParams(window.location.search);
      var h = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
      var desc = q.get('error_description') || h.get('error_description');
      var code = q.get('error_code') || h.get('error_code');
      if (!desc && !q.get('error') && !h.get('error')) return null;
      var text = desc ? desc.replace(/\+/g, ' ') : (q.get('error') || h.get('error'));
      if (code === 'otp_expired') {
        text = 'This magic link has expired or was already used. Request a new one and open it in the same browser.';
      }
      return text;
    }

    var err = urlError();
    if (err) {
      msgEl.textContent = 'Sign-in failed: ' + err;
      msgEl.className = 'msg error';
      setTimeout(function() { window.location.href = '/'; }, 4000);
      throw new Error('auth callback: ' + err);
    }

    // Implicit flow — must match the SDK client so the session token in the
    // URL is parsed the same way (see sdk/gamevolt.js).
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { flowType: 'implicit' }
    });

    // Supabase handles the code exchange automatically when it detects
    // the auth params in the URL hash/query. We just need to wait for
    // the session to be established.
    sb.auth.getSession().then(function(res) {
      if (res.data && res.data.session) {
        msgEl.textContent = 'Signed in! Redirecting...';
        // Redirect back to where user came from, or homepage
        var returnTo = sessionStorage.getItem('gv_return_to') || '/';
        sessionStorage.removeItem('gv_return_to');
        setTimeout(function() { window.location.href = returnTo; }, 500);
      } else if (res.error) {
        msgEl.textContent = 'Sign-in failed: ' + res.error.message;
        msgEl.className = 'msg error';
      } else {
        // No session yet — wait a moment for auth state change
        sb.auth.onAuthStateChange(function(event, session) {
          if (event === 'SIGNED_IN' && session) {
            msgEl.textContent = 'Signed in! Redirecting...';
            var returnTo = sessionStorage.getItem('gv_return_to') || '/';
            sessionStorage.removeItem('gv_return_to');
            setTimeout(function() { window.location.href = returnTo; }, 500);
          }
        });

        // Timeout fallback
        setTimeout(function() {
          if (!msgEl.textContent.includes('Redirecting')) {
            msgEl.textContent = 'Could not verify sign-in. Redirecting home...';
            setTimeout(function() { window.location.href = '/'; }, 1500);
          }
        }, 5000);
      }
    });
  </script>
</body>
</html>
