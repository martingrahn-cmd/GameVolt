name: One Stroke release

on:
  pull_request:
    paths:
      - "one-stroke/src/core/**"
      - "one-stroke/src/data/**"
      - "one-stroke/src/game/**"
      - "one-stroke/assets/**"
      - "one-stroke/index.html"
      - "one-stroke/manifest.json"
      - "one-stroke/styles.css"
      - "one-stroke/sw.js"
      - "one-stroke/tools/**"
      - ".github/workflows/one-stroke-campaign.yml"
  push:
    branches:
      - main
    paths:
      - "one-stroke/src/core/**"
      - "one-stroke/src/data/**"
      - "one-stroke/src/game/**"
      - "one-stroke/assets/**"
      - "one-stroke/index.html"
      - "one-stroke/manifest.json"
      - "one-stroke/styles.css"
      - "one-stroke/sw.js"
      - "one-stroke/tools/**"
      - ".github/workflows/one-stroke-campaign.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: one-stroke-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-campaign:
    name: Verify game release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Check JavaScript syntax
        run: |
          node --check one-stroke/src/data/campaign.js
          node --check one-stroke/src/game/app.js
          node --check one-stroke/tools/analyze_progression.mjs
          node --check one-stroke/tools/verify_cache_bump.mjs
          node --check one-stroke/tools/verify_cloud_save_contract.mjs
          node --check one-stroke/tools/verify_competition_determinism.mjs
          node --check one-stroke/tools/verify_dom_contract.mjs
          node --check one-stroke/tools/verify_campaign_release.mjs
          node --check one-stroke/tools/verify_pwa_release.mjs

      - name: Verify HTML, JavaScript and ARIA contract
        run: node one-stroke/tools/verify_dom_contract.mjs

      - name: Verify campaign release invariants
        run: node one-stroke/tools/verify_campaign_release.mjs

      - name: Verify Daily and Weekly determinism
        run: node one-stroke/tools/verify_competition_determinism.mjs

      - name: Verify cloud-save merge contract
        run: node one-stroke/tools/verify_cloud_save_contract.mjs

      - name: Verify hand-crafted bridge levels
        run: node one-stroke/tools/verify_bridge_levels.mjs

      - name: Verify PWA offline shell
        run: node one-stroke/tools/verify_pwa_release.mjs

      - name: Require cache bump for runtime changes
        if: github.event_name != 'workflow_dispatch'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: node one-stroke/tools/verify_cache_bump.mjs --base "$BASE_SHA"

      - name: Analyze progression
        run: node one-stroke/tools/analyze_progression.mjs
